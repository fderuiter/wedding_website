permissions:
  contents: write
  pull-requests: write
  issues: write
name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Verify Environment Variables Documentation
        run: npx tsx scripts/verify-env-docs.ts

      - name: Verify Documentation and Architecture Sync
        id: verify-docs
        run: |
          npx tsx scripts/generate-openapi.ts
          npx tsx scripts/generate-docs.ts
          
          # Capture status before creating any files
          STATUS=$(git status --porcelain)
          if [ -n "$STATUS" ]; then
            echo "$STATUS" > raw_drift.txt
            awk '{print $2}' raw_drift.txt > drift_files.txt
            echo "Drift detected in the following files:"
            cat drift_files.txt
            exit 1
          fi

      - name: Report Documentation Drift
        if: always() && github.event_name == 'pull_request' && steps.verify-docs.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const signature = '<!-- doc-drift-comment -->';
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const existing = comments.data.find(c => c.body.includes(signature));
            
            if ('${{ steps.verify-docs.outcome }}' === 'failure') {
              let commentBody = '';
              if (fs.existsSync('drift_files.txt')) {
                const filesList = fs.readFileSync('drift_files.txt', 'utf8').trim().split('\n');
                const driftedFilesMarkdown = filesList.map(line => `- \`${line}\``).join('\n');
                const filesForGitAdd = filesList.join(' ');
                
                commentBody = `${signature}\n### ⚠️ Documentation Drift Detected\n\nThe committed documentation files do not match the current codebase. The following files are out of sync:\n\n${driftedFilesMarkdown}\n\n**To resolve this locally, run the following commands and commit the changes:**\n\n\`\`\`bash\nnpx tsx scripts/generate-openapi.ts\nnpx tsx scripts/generate-docs.ts\ngit add ${filesForGitAdd}\ngit commit -m "docs: sync documentation with codebase"\n\`\`\`\n`;
              } else {
                commentBody = `${signature}\n### ⚠️ Documentation Generation Failed\n\nThe documentation generation scripts failed to execute. Please check the workflow logs for details on missing schemas or syntax errors.\n`;
              }
              
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: commentBody
                });
              } else {
                await github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: commentBody
                });
              }
            } else if ('${{ steps.verify-docs.outcome }}' === 'success' && existing) {
              const resolveBody = `${signature}\n### ✅ Documentation is now in sync!\n\nAll architecture and API files match the codebase.`;
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: resolveBody
              });
            }
      - name: Build project
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run tests
        run: npm test
      - name: Run e2e tests
        run: npx playwright test
      - name: Generate A11y Report
        if: always()
        run: node scripts/a11y-report.mjs
      - name: Post A11y Report to PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/a11y-summary.md';
            if (fs.existsSync(reportPath)) {
              const body = fs.readFileSync(reportPath, 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
      - name: Write A11y Report to Job Summary
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          if [ -f "test-results/a11y-summary.md" ]; then
            cat test-results/a11y-summary.md >> $GITHUB_STEP_SUMMARY
          fi

permissions:
  contents: write
  pull-requests: write
  issues: write
name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
          PGUSER: prisma
          PGDATABASE: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://prisma:password@localhost:5432/testing
      ADMIN_PASSWORD: testing-password

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run DB Migrations
        run: npx prisma migrate deploy
      - name: Seed Database
        run: npx tsx seed.ts
      - name: Generate API Docs & Check Schemas
        run: npx tsx scripts/generate-openapi.ts
      - name: Commit API Docs updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update API references"
          file_pattern: "public/openapi.json public/docs.html"
      - name: Build project
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run tests
        run: npm test
      - name: Run e2e tests
        run: npx playwright test
      - name: Generate A11y Report
        if: always()
        run: node scripts/a11y-report.mjs
        continue-on-error: true
      - name: Post A11y Report to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/a11y-summary.md';
            if (fs.existsSync(reportPath)) {
              const body = fs.readFileSync(reportPath, 'utf8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }
      - name: Upload A11y Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: test-results/a11y-summary.md

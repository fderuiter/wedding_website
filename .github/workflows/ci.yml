permissions:
  contents: write
name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Generate API Docs & Check Schemas
        run: npx tsx scripts/generate-api-docs.ts
      - name: Commit API Docs updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update API references"
          file_pattern: "API_DOCUMENTATION.md"
      - name: Build project
        run: npm run build
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run tests
        run: npm test
      - name: Run e2e tests
        run: npx playwright test

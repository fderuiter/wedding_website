name: Deploy Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Verify mandatory secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "ERROR: Missing mandatory configuration secret: DATABASE_URL."
            exit 1
          fi
          if [[ ! "${{ secrets.DATABASE_URL }}" =~ ^postgres(ql)?:// ]]; then
            echo "ERROR: Invalid format for DATABASE_URL. Must start with postgres:// or postgresql://"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      - name: Verify external registry secrets
        id: registry_check
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: Missing external registry credentials (DOCKERHUB_USERNAME and/or DOCKERHUB_TOKEN). Falling back to local-only build with default tag."
            echo "push=false" >> $GITHUB_OUTPUT
            echo "tags=my-app:latest" >> $GITHUB_OUTPUT
          else
            echo "push=true" >> $GITHUB_OUTPUT
            echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/my-app:${{ github.sha }},${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        if: steps.registry_check.outputs.push == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.registry_check.outputs.push == 'true' }}
          tags: ${{ steps.registry_check.outputs.tags }}
